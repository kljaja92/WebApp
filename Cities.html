<!DOCTYPE html>
<html>

<head>
    <title>Cities</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.2em;
        }

        .city {
            /* background-image: linear-gradient(to right, #db1e1e 10%, #33be46 30%, #356eb9 50%); */
            background-image: radial-gradient(circle, #db1e1e 10%, #33be46 30%, #356eb9 50%);
            margin: 25px 40px;
            padding: 10px 20px 15px 30px;
            width: 350px;
            height: 100px;
            font-size: 18px;
            float: left;
            border: 8px solid #07bb52;
            border-radius: 6px 15px 20px 10px;
            box-shadow: 10px 20px 10px 5px #16a8d4;
            /* transition: background-color 2s, font-size 2s, transform 2s; */
        }

        @keyframes myanimation {
            0% {
                background-color: #6be09c;
                transform: rotate(0deg) scale(1);
            }
            25% {
                background-color: #ff0000;
                transform: rotate(-90deg) scale(1.5);
            }
            50% {
                background-color: #00ff00;
                transform: rotate(90) scale(1.5);
            }
            75% {
                background-color: #0000ff;
                transform: rotate(0deg) scale(2);
            }
            100% {
                background-color: #6be09c;
                transform: rotate(0deg) scale(1);
            }
        }

        .city:active {
            background-color: #0a9142;
            font-size: 40px;
            /* transform: scale(1.3) rotate(90deg); */
            /* transform: translate(20px, 30px) rotate(90deg); */
            /* transform: skew(40deg); */
            /* transform: rotate3d(0.2, 1, 0.2, 180deg); */
            /* transform: scale3d(0.5, 2, 0.5); */
            animation: myanimation 10s;
        }

        /* #kg {
            outline: 6px dashed #082891;
            outline-offset: 4px;
        } */
    </style>
</head>

<body>
    <h1>Cities of Serbia</h1>

    <div class="city">Belgrade</div>
    <div class="city">Novi Sad</div>
    <div class="city">Niš</div>
    <div class="city" id="kg">Kragujevac</div>
    <div class="city">Subotica</div>

</body>

</html>
